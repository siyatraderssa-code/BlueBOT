<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Siyatraders | Pro Terminal</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { background: #000; color: white; margin: 0; font-family: sans-serif; overflow: hidden; }
        .grid { display: grid; grid-template-rows: 60px 1fr 180px; height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 25px; border-bottom: 2px solid #00d4ff; background: #0a0a0a; }
        .news-panel { background: #0a0a0a; border-top: 1px solid #333; padding: 15px; overflow-y: auto; display: flex; gap: 20px; }
        .news-item { background: #111; padding: 12px; border-radius: 8px; border-left: 3px solid #00d4ff; min-width: 300px; font-size: 13px; }
        #navMenu { display:none; position:fixed; top:70px; right:20px; background:#111; border:1px solid #00d4ff; padding:20px; border-radius:10px; z-index:9999; }
        #navMenu a { display:block; color:white; text-decoration:none; margin-bottom:12px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="grid">
        <header>
            <h2 style="margin:0; letter-spacing:2px;">SIYA<span style="color:#00d4ff">TRADERS</span></h2>
            <button onclick="toggleMenu()" style="background:#00d4ff; border:none; padding:8px 18px; font-weight:bold; cursor:pointer; border-radius:4px;">MENU ☰</button>
        </header>

        <div id="tradingview_terminal" style="height: 100%;"></div>

        <div class="news-panel">
            <div class="news-item">
                <strong style="color:#00d4ff">MACRO:</strong><br>
                US Core PCE Data expected at 14:30. High volatility projected for DXY pairs.
            </div>
            <div class="news-item">
                <strong style="color:#00d4ff">CRYPTO:</strong><br>
                Bitcoin Institutional inflow hits $2B this week. Support holding at $64k.
            </div>
        </div>
    </div>

    <div id="navMenu">
        <a href="analyzer.html">📈 SMC Analyzer</a>
        <a href="terminal.html" style="color:#00d4ff">💻 Pro Terminal</a>
        <a href="vault.html">🔐 Strategy Vault</a>
        <a href="ai-analyzer.html">🤖 AI Vision Scan</a>
        <hr style="border:0; border-top:1px solid #333; margin:10px 0;">
        <a href="index.html" style="color:#ff0055">Logout</a>
    </div>

    <script>
        function toggleMenu() { const m = document.getElementById('navMenu'); m.style.display = (m.style.display === 'block') ? 'none' : 'block'; }
        new TradingView.widget({
            "autosize": true,
            "symbol": "NASDAQ:NAS100",
            "interval": "15",
            "theme": "dark",
            "container_id": "tradingview_terminal",
            "allow_symbol_change": true,
            "details": true,
            "hotlist": true
        });
    </script>
</body>
</html>
